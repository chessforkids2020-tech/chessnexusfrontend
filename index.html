<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Chess Nexus — Online Chess Puzzles, Tactics & Live Races | chessnexus.in</title>
    <meta name="description" content="Chess Nexus is a free online chess platform to solve daily puzzles, practice tactics, compete in live arena races, and improve your rating. Join 1000+ players from 10+ countries." />
    <meta name="keywords" content="chess puzzles, chess tactics, chess online, chess arena, chess race, chess platform, free chess, improve chess rating, chess nexus, online chess india, daily chess puzzles, chess training" />
    <meta name="author" content="Chess Nexus" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://chessnexus.in/" />

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    <meta name="theme-color" content="#06b6d4" />
    <meta name="msapplication-TileColor" content="#06b6d4" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Chess Nexus" />
    <meta property="og:title" content="Chess Nexus — Free Online Chess Puzzles, Tactics & Live Races" />
    <meta property="og:description" content="Solve daily chess puzzles, compete in live arena races, practice tactics, and climb the leaderboard. Free to play. Join Chess Nexus today." />
    <meta property="og:url" content="https://chessnexus.in/" />
    <meta property="og:image" content="https://chessnexus.in/logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Chess Nexus — Online Chess Platform" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ChessNexus" />
    <meta name="twitter:creator" content="@ChessNexus" />
    <meta name="twitter:title" content="Chess Nexus — Free Online Chess Puzzles & Live Races" />
    <meta name="twitter:description" content="Solve daily chess puzzles, join live arena races, and improve your tactics. Free online chess platform." />
    <meta name="twitter:image" content="https://chessnexus.in/logo.png" />
    <meta name="twitter:image:alt" content="Chess Nexus" />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://chessnexus.in" />
    <link rel="dns-prefetch" href="https://chessnexus.in" />

    <!-- JSON-LD: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Chess Nexus",
      "url": "https://chessnexus.in/",
      "description": "Free online chess platform for solving puzzles, practicing tactics, and competing in live arena races.",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Web Browser",
      "browserRequirements": "Requires JavaScript",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "featureList": [
        "Daily Chess Puzzles",
        "Live Arena Races",
        "Chess Tactics Training",
        "Monthly Focus Challenges",
        "Global Leaderboard",
        "Team Race Mode",
        "Chess Study System"
      ],
      "screenshot": "https://chessnexus.in/logo.png",
      "inLanguage": "en"
    }
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Chess Nexus",
      "url": "https://chessnexus.in/",
      "logo": "https://chessnexus.in/logo.png",
      "sameAs": [],
      "description": "Chess Nexus is a free online chess training and competition platform offering puzzles, tactics, live races, and leaderboards."
    }
    </script>

    <!-- JSON-LD: WebSite — helps Google understand the site as a single entity -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Chess Nexus",
      "alternateName": "ChessNexus",
      "url": "https://chessnexus.in/"
    }
    </script>

    <!-- JSON-LD: SiteNavigationElement — the strongest signal Google uses to
         build sitelinks. Lists the primary public sections of the site. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Chess Nexus main navigation",
      "itemListElement": [
        { "@type": "SiteNavigationElement", "position": 1, "name": "Play Chess Online", "description": "Play live chess against people or the Stockfish engine.", "url": "https://chessnexus.in/play-chess-online" },
        { "@type": "SiteNavigationElement", "position": 2, "name": "Play With Friends", "description": "Play 2-player chess with a friend in a private room.", "url": "https://chessnexus.in/play-chess-with-friends" },
        { "@type": "SiteNavigationElement", "position": 3, "name": "Chess Puzzles", "description": "Solve daily chess puzzles and train tactics.", "url": "https://chessnexus.in/chess-puzzles" },
        { "@type": "SiteNavigationElement", "position": 4, "name": "Arena Tournaments", "description": "Compete in live 3D arena chess tournaments.", "url": "https://chessnexus.in/3d-chess-arena-tournament" },
        { "@type": "SiteNavigationElement", "position": 5, "name": "Masters Games", "description": "Play through famous grandmaster games move by move.", "url": "https://chessnexus.in/masters-chess-games" },
        { "@type": "SiteNavigationElement", "position": 6, "name": "Tactics Race", "description": "Race against others to solve tactics fastest.", "url": "https://chessnexus.in/chess-tactics-race" },
        { "@type": "SiteNavigationElement", "position": 7, "name": "Leaderboard", "description": "See the top players on the global leaderboard.", "url": "https://chessnexus.in/leaderboard" },
        { "@type": "SiteNavigationElement", "position": 8, "name": "Analyse My Game", "description": "Analyse your chess games with accuracy scores.", "url": "https://chessnexus.in/analyse-my-chess-game" },
        { "@type": "SiteNavigationElement", "position": 9, "name": "Chess Study", "description": "Learn with structured chess study lessons.", "url": "https://chessnexus.in/chess-study" },
        { "@type": "SiteNavigationElement", "position": 10, "name": "Log In / Register", "description": "Sign in or create a free Chess Nexus account.", "url": "https://chessnexus.in/login" }
      ]
    }
    </script>

    <!-- JSON-LD: FAQPage for SEO rich results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Chess Nexus free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Chess Nexus is completely free. All core features including daily puzzles, tactics training, and live arena races are available at no cost."
          }
        },
        {
          "@type": "Question",
          "name": "What chess features does Chess Nexus offer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Chess Nexus offers daily chess puzzles, live arena races, team race mode, monthly focus challenges, a global leaderboard, chess study system, and tactics training."
          }
        },
        {
          "@type": "Question",
          "name": "How do I improve my chess rating on Chess Nexus?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Solve daily puzzles, participate in arena races, complete monthly focus challenges, and use the study system to improve your chess rating on Chess Nexus."
          }
        }
      ]
    }
    </script>
  </head>

    <div id="root"></div>
